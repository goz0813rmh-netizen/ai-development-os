name: AI Company OS

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: string
      model:
        description: OpenAI model
        required: false
        default: gpt-4.1-mini
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: company-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  company:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '/company') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository secrets."
            exit 1
          fi

      - name: Run Facilitator, CPO, Auditor and Historian
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.model || 'gpt-4.1-mini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: node scripts/company.mjs
