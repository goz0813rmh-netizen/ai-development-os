name: AI Company OS

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: string
      model:
        description: OpenAI model
        required: false
        default: gpt-4.1-mini
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: company-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  company:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '/company') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository secrets."
            exit 1
          fi

      - name: Run AI Company OS
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.model || 'gpt-4.1-mini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: node scripts/company.mjs

  record-approved-decision:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, 'APPROVED') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record approved decision
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CEO_COMMENT: ${{ github.event.comment.body }}
        run: node scripts/record-decision.mjs

  implement-approved-plan:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/implement') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured in repository secrets."
            exit 1
          fi

      - name: Implement approved plan and open PR
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/implement.mjs
